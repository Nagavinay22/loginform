<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
    <style>
        body {
            background-color: #c2acac;
            font-family: Arial;
        }
        .login-box {
            background-color: white;
            width: 300px;
            padding: 20px;
            margin: 100px auto;
            border-radius: 10px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            background-color: rgb(173, 173, 224);
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
         
          <class= "forgotpassword">
        <button>Login</button>
    </div>
</body>
</html>
